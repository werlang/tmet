services:
    web:
        build: .
        restart: unless-stopped
        volumes:
            - ./:/app
            - node_modules:/app/node_modules
        working_dir: /app
        env_file:
            - .env
        ports:
            - 127.0.0.1:80:3000
        command: npm run ui
    node:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            # - 127.0.0.1:9229:9229
            - 127.0.0.1:3000:3000
        env_file:
            - .env
        volumes:
            - .:/app
            - node_modules:/app/node_modules
        # command: npm run ${NODE_ENV:-development}
        command: tail -f /dev/null #idle container
    chrome:
        image: 'browserless/chrome:latest'
        restart: unless-stopped
volumes:
    node_modules:
